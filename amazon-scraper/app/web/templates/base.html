<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Amazon Price Monitor{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <style>
        :root {
            --primary: #0d6efd;
            --success: #198754;
            --danger: #dc3545;
            --warning: #ffc107;
        }
        body { background: #f5f7fa; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        .navbar { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); }
        .navbar-brand { font-weight: 700; letter-spacing: -0.5px; }
        .stat-card {
            border: none; border-radius: 12px; transition: transform 0.2s;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
        }
        .stat-card:hover { transform: translateY(-2px); }
        .stat-icon { font-size: 2rem; }
        .stat-value { font-size: 1.75rem; font-weight: 700; }
        .stat-label { color: #6c757d; font-size: 0.875rem; }
        .product-table { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
        .product-table th { background: #f8f9fa; font-weight: 600; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.5px; }
        .price-drop { color: var(--danger); font-weight: 600; }
        .rating-stars { color: #f5a623; }
        .asin-badge { font-family: monospace; font-size: 0.8rem; background: #e9ecef; padding: 2px 8px; border-radius: 4px; }
        .footer { color: #6c757d; font-size: 0.85rem; margin-top: 3rem; padding: 1.5rem 0; border-top: 1px solid #e9ecef; }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>
    <nav class="navbar navbar-dark">
        <div class="container">
            <a class="navbar-brand" href="/">
                <i class="bi bi-amazon"></i> Amazon Price Monitor
            </a>
            <span class="text-light opacity-75 small">v2.0</span>
        </div>
    </nav>

    <div class="container mt-4">
        {% block content %}{% endblock %}
    </div>

    <footer class="footer text-center">
        <div class="container">
            Amazon Product Scraper & Price Monitor — Built with FastAPI + Playwright + ECharts
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    {% block extra_scripts %}{% endblock %}
</body>
</html>
